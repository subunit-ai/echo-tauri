name: release

# Tag a version (e.g. v0.2.0) to build + publish signed installers for all
# platforms. tauri-action creates the GitHub Release and the updater manifest
# (latest.json) when the signing key is present.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        # On-device whisper.cpp (LOCAL mode). Linux + Win-x64 build the Vulkan GPU
        # backend; Win-ARM builds CPU local (ARM Vulkan SDK in CI is a follow-up —
        # a working CPU build beats a broken one). Every runner needs clang/libclang
        # (bindgen) + cmake + a C++ compiler — installed per platform below.
        include:
          - platform: ubuntu-24.04        # Linux x86_64 — Vulkan GPU local whisper
            args: "--features local-whisper-gpu"
          - platform: windows-latest      # Windows x86_64 — Vulkan GPU local whisper
            args: "--features local-whisper-gpu"
          - platform: windows-11-arm      # Windows ARM64 (Erik) — CPU local whisper (ARM64 libclang)
            args: "--features local-whisper"
          - platform: macos-14            # macOS Apple Silicon (M1) — CPU local whisper
            # Unsigned / un-notarized: internal use only. tauri-action skips Apple signing
            # when no APPLE_* secrets are present; Gatekeeper is cleared manually (right-click →
            # Open, or `xattr -dr com.apple.quarantine /Applications/echo.app`). The Tauri
            # updater bundle is still minisign-signed (TAURI_SIGNING_PRIVATE_KEY), so the
            # in-app auto-update path works on macOS too.
            args: "--target aarch64-apple-darwin --features local-whisper"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libsoup-3.0-dev librsvg2-dev libayatana-appindicator3-dev \
            libasound2-dev libxdo-dev libssl-dev patchelf \
            build-essential clang libclang-dev cmake \
            libvulkan-dev glslc
          echo "VULKAN_SDK=/usr" >> "$GITHUB_ENV"

      - name: LLVM x64 + CMake + Ninja (Windows x64)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          choco install llvm cmake ninja --no-progress -y --installargs 'ADD_CMAKE_TO_PATH=System'
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Append
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          "C:\Program Files\CMake\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          # ggml-vulkan builds vulkan-shaders-gen as a nested ExternalProject; the VS/MSBuild
          # generator's FileTracker (.tlog) blows past MAX_PATH under cargo's deep target dir
          # (FTK1011 → MSB8066). Ninja has no FileTracker → sidesteps it entirely.
          "CMAKE_GENERATOR=Ninja" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Vulkan SDK (Windows x64, GPU whisper — keep glslc for shader gen)
        if: matrix.platform == 'windows-latest'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: 1.3.290.0
          install_runtime: true
          cache: true
          stripdown: false

      - name: glslc on PATH (Windows x64)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: '"$env:VULKAN_SDK\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append'

      - name: MSVC env (Windows x64 — Ninja needs cl + INCLUDE/LIB in the job env)
        if: matrix.platform == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: ARM64 LLVM + CMake + Ninja (Windows ARM — choco LLVM is x64)
        if: matrix.platform == 'windows-11-arm'
        shell: pwsh
        run: |
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-19.1.5/LLVM-19.1.5-woa64.exe"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\llvm-arm64.exe"
          Start-Process -FilePath "$env:RUNNER_TEMP\llvm-arm64.exe" -ArgumentList '/S' -Wait
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Append
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          choco install cmake ninja --no-progress -y --installargs 'ADD_CMAKE_TO_PATH=System'
          "C:\Program Files\CMake\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          # ggml-cpu refuses MSVC on ARM ("use clang"); build with Ninja + clang-cl.
          "CMAKE_GENERATOR=Ninja" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CC=clang-cl" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CXX=clang-cl" | Out-File -FilePath $env:GITHUB_ENV -Append
          # clang-cl defaults to exceptions-disabled; gguf.cpp uses try/catch -> force /EHsc.
          "CXXFLAGS=/EHsc" | Out-File -FilePath $env:GITHUB_ENV -Append
          # ggml's aarch64 "repack" GEMM kernels (ggml_gemm_*_4x4 …) are GNU-asm only and
          # don't link with the Windows-ARM toolchain (LNK2019/LNK2005 in repack.cpp).
          # Disable them -> generic C path. whisper-rs-sys forwards any GGML_* env as -D.
          # (name differs by ggml version; unknown -D is a harmless cmake warning.)
          "GGML_CPU_AARCH64=OFF" | Out-File -FilePath $env:GITHUB_ENV -Append
          "GGML_CPU_REPACK=OFF" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: MSVC env for clang-cl (Windows ARM — INCLUDE/LIB for the ARM64 MSVC CRT)
        if: matrix.platform == 'windows-11-arm'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: arm64

      - name: cmake (macOS — whisper.cpp build needs it; libclang ships with Xcode)
        if: matrix.platform == 'macos-14'
        run: brew list cmake >/dev/null 2>&1 || brew install cmake

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-14' && 'aarch64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (minisign). Public key lives in tauri.conf.json.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Crash reporting DSNs (no-op if unset).
          ECHO_SENTRY_DSN: ${{ secrets.ECHO_SENTRY_DSN }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          # Windows Authenticode via Azure Trusted Signing — configure in
          # tauri.conf.json bundle.windows + add the Azure secrets here.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Echo ${{ github.ref_name }}"
          # Publish directly (no draft) so installers are visible on the Releases
          # page; non-prerelease so the updater's /releases/latest resolves.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
