name: release

# Tag a version (e.g. v0.2.0) to build + publish signed installers for all
# platforms. tauri-action creates the GitHub Release and the updater manifest
# (latest.json) when the signing key is present.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        # On-device whisper.cpp (LOCAL mode). Linux + Win-x64 build the Vulkan GPU
        # backend; Win-ARM builds CPU local (ARM Vulkan SDK in CI is a follow-up —
        # a working CPU build beats a broken one). Every runner needs clang/libclang
        # (bindgen) + cmake + a C++ compiler — installed per platform below.
        include:
          - platform: ubuntu-24.04        # Linux x86_64 — Vulkan GPU local whisper
            args: "--features local-whisper-gpu"
          - platform: windows-latest      # Windows x86_64 — Vulkan GPU local whisper
            args: "--features local-whisper-gpu"
          - platform: windows-11-arm      # Windows ARM64 (Erik) — CPU local whisper + local-meet
            # local-meet adds the wespeaker voiceprint embedder (meet-core/embedder →
            # the `ort` onnxruntime crate). ort ships PREBUILT onnxruntime binaries for
            # aarch64-pc-windows-msvc (statically linked — no DLL to bundle), so Erik's
            # ARM Surface gets the Pro local-meeting pipeline too, same as macOS. Needs
            # the recent Win11 + VS2022 the windows-11-arm runner already provides.
            args: "--features local-meet"
          - platform: macos-14            # macOS Apple Silicon (M1) — CPU local whisper
            # Ad-hoc signed ("-" from tauri.conf.json) — the known-good path that builds.
            # The stable self-signed cert (APPLE_* secrets) is disabled in the env block
            # below: its identity didn't resolve and blocked the macOS build since v0.4.24.
            # Trade-off until re-enabled: macOS re-prompts for Mic + Accessibility once per
            # update (ad-hoc identity changes each build). Gatekeeper still needs
            # right-click → Open on first launch. Updater bundle stays minisign-signed.
            # local-meet (= local-whisper + wespeaker/ort): macOS-first Rollout des
            # lokalen Meet-Backends — ort zieht onnxruntime-Binaries (macOS arm64
            # offiziell unterstützt). Andere Plattformen folgen nach CI-Verifikation.
            args: "--target aarch64-apple-darwin --features local-meet"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libsoup-3.0-dev librsvg2-dev libayatana-appindicator3-dev \
            libasound2-dev libxdo-dev libssl-dev patchelf \
            build-essential clang libclang-dev cmake \
            libvulkan-dev glslc
          echo "VULKAN_SDK=/usr" >> "$GITHUB_ENV"
          # libopus (opusic-sys) builds from vendored source via CMake — cmake is
          # already installed above; no extra deps needed.

      - name: LLVM x64 + CMake + Ninja (Windows x64)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          choco install llvm cmake ninja --no-progress -y --installargs 'ADD_CMAKE_TO_PATH=System'
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Append
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          "C:\Program Files\CMake\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          # ggml-vulkan builds vulkan-shaders-gen as a nested ExternalProject; the VS/MSBuild
          # generator's FileTracker (.tlog) blows past MAX_PATH under cargo's deep target dir
          # (FTK1011 → MSB8066). Ninja has no FileTracker → sidesteps it entirely.
          "CMAKE_GENERATOR=Ninja" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Vulkan SDK (Windows x64, GPU whisper — keep glslc for shader gen)
        if: matrix.platform == 'windows-latest'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: 1.3.290.0
          install_runtime: true
          cache: true
          stripdown: false

      - name: glslc on PATH (Windows x64)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: '"$env:VULKAN_SDK\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append'

      - name: MSVC env (Windows x64 — Ninja needs cl + INCLUDE/LIB in the job env)
        if: matrix.platform == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: ARM64 LLVM + CMake + Ninja (Windows ARM — choco LLVM is x64)
        if: matrix.platform == 'windows-11-arm'
        shell: pwsh
        run: |
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-19.1.5/LLVM-19.1.5-woa64.exe"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\llvm-arm64.exe"
          Start-Process -FilePath "$env:RUNNER_TEMP\llvm-arm64.exe" -ArgumentList '/S' -Wait
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Append
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          choco install cmake ninja --no-progress -y --installargs 'ADD_CMAKE_TO_PATH=System'
          "C:\Program Files\CMake\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          # ggml-cpu refuses MSVC on ARM ("use clang"); build with Ninja + clang-cl.
          "CMAKE_GENERATOR=Ninja" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CC=clang-cl" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CXX=clang-cl" | Out-File -FilePath $env:GITHUB_ENV -Append
          # clang-cl defaults to exceptions-disabled; gguf.cpp uses try/catch -> force /EHsc.
          "CXXFLAGS=/EHsc" | Out-File -FilePath $env:GITHUB_ENV -Append
          # ggml's aarch64 "repack" GEMM kernels (ggml_gemm_*_4x4 …) are GNU-asm only and
          # don't link with the Windows-ARM toolchain (LNK2019/LNK2005 in repack.cpp).
          # Disable them -> generic C path. whisper-rs-sys forwards any GGML_* env as -D.
          # (name differs by ggml version; unknown -D is a harmless cmake warning.)
          "GGML_CPU_AARCH64=OFF" | Out-File -FilePath $env:GITHUB_ENV -Append
          "GGML_CPU_REPACK=OFF" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: MSVC env for clang-cl (Windows ARM — INCLUDE/LIB for the ARM64 MSVC CRT)
        if: matrix.platform == 'windows-11-arm'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: arm64

      - name: macOS build env (cmake + deployment target for whisper.cpp std::filesystem)
        if: matrix.platform == 'macos-14'
        run: |
          brew list cmake >/dev/null 2>&1 || brew install cmake
          # whisper.cpp's ggml uses std::filesystem (introduced in macOS 10.15); the default
          # deployment target is older, so clang marks fs::path "unavailable" and the build
          # fails. Apple Silicon is macOS 11.0+ anyway → pin 11.0 for clang + cmake.
          echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> "$GITHUB_ENV"
          echo "CMAKE_OSX_DEPLOYMENT_TARGET=11.0" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-14' && 'aarch64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: npm ci

      - name: macOS signing keychain (stable self-signed cert — keeps TCC grants across updates)
        if: matrix.platform == 'macos-14'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERTIFICATE:-}" ] || [ -z "${APPLE_SIGNING_IDENTITY:-}" ]; then
            echo "no signing cert configured — staying ad-hoc"; exit 0
          fi
          # We do the keychain dance OURSELVES (not via tauri-action's cert env):
          # the cert is SELF-SIGNED, and codesign refuses to resolve an untrusted
          # identity (CSSMERR_TP_NOT_TRUSTED) — that was the real cause of the
          # v0.4.24+ "failed to resolve signing identity" failures. tauri-action
          # imports but never TRUSTS the cert; the add-trusted-cert below does.
          echo "$APPLE_CERTIFICATE" | base64 -d > /tmp/echo-sign.p12
          security create-keychain -p ci build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p ci build.keychain
          security set-keychain-settings -lut 21600 build.keychain  # no auto-lock mid-build
          security import /tmp/echo-sign.p12 -k build.keychain \
            -P "${APPLE_CERTIFICATE_PASSWORD:-}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k ci build.keychain > /dev/null
          security find-certificate -c "$APPLE_SIGNING_IDENTITY" -p build.keychain > /tmp/echo-sign.pem
          sudo security add-trusted-cert -d -r trustRoot -p codeSign \
            -k /Library/Keychains/System.keychain /tmp/echo-sign.pem
          rm /tmp/echo-sign.p12
          echo "valid codesigning identities now:"
          security find-identity -v -p codesigning build.keychain

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (minisign). Public key lives in tauri.conf.json.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Crash reporting DSNs (no-op if unset).
          ECHO_SENTRY_DSN: ${{ secrets.ECHO_SENTRY_DSN }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          # macOS: STABLE signing identity (env overrides tauri.conf's ad-hoc "-").
          # Identity-stable signing is what makes macOS TCC (Accessibility/Mic)
          # grants SURVIVE updates — ad-hoc re-signed every build, so macOS saw
          # "a new app" each release and dropped the grants. The cert was
          # imported + trusted in the keychain step above; deliberately NOT
          # passing APPLE_CERTIFICATE here (tauri-action would re-import it
          # untrusted into its own keychain).
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Windows Authenticode via Azure Trusted Signing — configure in
          # tauri.conf.json bundle.windows + add the Azure secrets here.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Echo ${{ github.ref_name }}"
          # Build into a DRAFT and publish atomically in the `publish` job below,
          # only after ALL platforms uploaded. Publishing per-job (the old
          # releaseDraft:false) made /releases/latest — the updater endpoint —
          # serve a half-built latest.json while the run was in flight (or stuck
          # after a macOS flake), so Macs saw "None of the fallback platforms
          # ['darwin-aarch64-app','darwin-aarch64'] were found".
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  publish:
    # Atomic release: flip the draft public only when every platform's installers
    # AND a COMPLETE latest.json are present. If any build job fails, the draft
    # stays invisible and the updater keeps serving the previous full release;
    # `gh run rerun --failed` re-runs the failed build and then this job.
    #
    # latest.json is REBUILT here deterministically from the per-platform .sig
    # assets rather than trusting the one tauri-action uploaded. tauri-action merges
    # latest.json in-place per build job (read-modify-write, no lock); a partial
    # rerun once left a Windows-only manifest that published as "latest" and broke
    # the macOS updater ("None of the fallback platforms… were found"). Assembling
    # from the .sig files here is race-free, and we refuse to publish if any
    # platform is missing.
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Assemble + validate latest.json, then publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          repo="${{ github.repository }}"
          ver="${tag#v}"
          now="$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"
          base_url="https://github.com/$repo/releases/download/$tag"

          # Drafts aren't resolvable via /releases/tags/<tag> — find by listing.
          rel=$(gh api "repos/$repo/releases?per_page=30" \
            --jq "[.[] | select(.tag_name==\"$tag\")][0]")
          id=$(echo "$rel" | jq -r '.id // empty')
          if [ -z "$id" ]; then echo "::error::no release found for $tag"; exit 1; fi

          # Updater bundle filenames → their tauri platform key(s).
          mac="echo_aarch64.app.tar.gz"
          lin="echo_${ver}_amd64.AppImage"
          win64="echo_${ver}_x64-setup.exe"
          winarm="echo_${ver}_arm64-setup.exe"

          assets=$(echo "$rel" | jq -r '.assets[].name')
          have() { echo "$assets" | grep -qx "$1"; }

          # Every platform must have BOTH its installer and its .sig, or we refuse to
          # publish — a half manifest is exactly the failure mode we're preventing.
          missing=""
          for f in "$mac" "$lin" "$win64" "$winarm"; do
            have "$f"     || missing="$missing $f"
            have "$f.sig" || missing="$missing $f.sig"
          done
          if [ -n "$missing" ]; then
            echo "::error::latest.json would be incomplete — missing:$missing"
            echo "::error::leaving draft hidden; rerun the failed build job(s)."
            exit 1
          fi

          # latest.json's signature field = the .sig file content VERBATIM (tauri
          # writes the minisign blob already base64-armored; do NOT re-encode it).
          for f in "$mac" "$lin" "$win64" "$winarm"; do
            gh release download "$tag" -R "$repo" -p "$f.sig" -O "/tmp/$f.sig" --clobber
          done

          python3 - "$ver" "$now" "$base_url" "$mac" "$lin" "$win64" "$winarm" \
            > /tmp/latest.json <<'PY'
          import sys, json
          ver, now, base = sys.argv[1], sys.argv[2], sys.argv[3]
          mac, lin, win64, winarm = sys.argv[4:8]
          def sig(name):
              with open(f"/tmp/{name}.sig", "r", encoding="utf-8") as fh:
                  return fh.read().strip()
          def url(name): return f"{base}/{name}"
          plats = {}
          for k in ("darwin-aarch64", "darwin-aarch64-app"):
              plats[k] = {"signature": sig(mac), "url": url(mac)}
          for k in ("linux-x86_64", "linux-x86_64-appimage"):
              plats[k] = {"signature": sig(lin), "url": url(lin)}
          for k in ("windows-x86_64", "windows-x86_64-nsis"):
              plats[k] = {"signature": sig(win64), "url": url(win64)}
          for k in ("windows-aarch64", "windows-aarch64-nsis"):
              plats[k] = {"signature": sig(winarm), "url": url(winarm)}
          json.dump({"version": ver, "notes": "", "pub_date": now,
                     "platforms": plats}, sys.stdout, indent=2)
          PY

          # Belt-and-suspenders: assert all four base platforms made it in.
          for k in darwin-aarch64 linux-x86_64 windows-x86_64 windows-aarch64; do
            jq -e ".platforms[\"$k\"].url" /tmp/latest.json >/dev/null \
              || { echo "::error::assembled latest.json missing $k"; exit 1; }
          done
          echo "assembled latest.json:"; jq '.platforms | keys' /tmp/latest.json

          # Replace the racy latest.json on the draft, then flip it public + latest.
          gh release upload "$tag" -R "$repo" /tmp/latest.json --clobber
          gh api -X PATCH "repos/$repo/releases/$id" \
            -F draft=false -f make_latest=true > /dev/null
          echo "published $tag (release $id) with a complete latest.json"
