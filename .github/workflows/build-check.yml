name: build-check

# Compile-only validation for the two hard Windows whisper.cpp targets.
# No release, no signing, no upload — just prove the whisper-rs-sys cmake build
# (ggml-vulkan on x64, ggml-cpu+clang on ARM) compiles, with full logs.
# Dispatch manually: gh workflow run build-check.yml --ref main
on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest     # x86_64 — Vulkan GPU local whisper
            feature: "local-whisper-gpu"
          - platform: windows-11-arm      # ARM64 — CPU local whisper (clang-cl)
            feature: "local-whisper"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: LLVM x64 + CMake + Ninja (Windows x64)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          choco install llvm cmake ninja --no-progress -y --installargs 'ADD_CMAKE_TO_PATH=System'
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Append
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          "C:\Program Files\CMake\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          # ggml-vulkan builds vulkan-shaders-gen as a nested ExternalProject; the VS/MSBuild
          # generator's FileTracker (.tlog) blows past MAX_PATH under cargo's deep target dir
          # (FTK1011 → MSB8066). Ninja has no FileTracker → sidesteps it entirely.
          "CMAKE_GENERATOR=Ninja" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Vulkan SDK (Windows x64, GPU whisper — keep glslc for shader gen)
        if: matrix.platform == 'windows-latest'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: 1.3.290.0
          install_runtime: true
          cache: true
          stripdown: false

      - name: glslc on PATH (Windows x64)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: '"$env:VULKAN_SDK\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append'

      - name: ARM64 LLVM + CMake + Ninja (Windows ARM — choco LLVM is x64)
        if: matrix.platform == 'windows-11-arm'
        shell: pwsh
        run: |
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-19.1.5/LLVM-19.1.5-woa64.exe"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\llvm-arm64.exe"
          Start-Process -FilePath "$env:RUNNER_TEMP\llvm-arm64.exe" -ArgumentList '/S' -Wait
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Append
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          choco install cmake ninja --no-progress -y --installargs 'ADD_CMAKE_TO_PATH=System'
          "C:\Program Files\CMake\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          # ggml-cpu refuses MSVC on ARM ("use clang"); build with Ninja + clang-cl.
          "CMAKE_GENERATOR=Ninja" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CC=clang-cl" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CXX=clang-cl" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: MSVC env for clang-cl (Windows ARM — INCLUDE/LIB for the ARM64 MSVC CRT)
        if: matrix.platform == 'windows-11-arm'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: arm64

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: npm ci
      - run: npm run build

      - name: cargo build (compiles whisper-rs-sys = the real toolchain check)
        shell: pwsh
        run: cargo build --release --manifest-path src-tauri/Cargo.toml --features ${{ matrix.feature }}
